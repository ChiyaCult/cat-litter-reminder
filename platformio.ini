; PlatformIO project for the Cat Litter Reminder MVP
;
; Two environments:
;   esp32dev - the real firmware, built for the ESP32 devkit + Adafruit ThinkInk e-ink display.
;   native   - compiles and runs the hardware-independent unit tests on this computer
;              (no ESP32 toolchain needed). This is the fast feedback loop; use it while
;              developing the domain logic in src/domain/.
;
; Run native tests with:   pio test -e native
; Build/upload firmware with: pio run -e esp32dev -t upload

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit EPD@^4.5.5
    adafruit/Adafruit GFX Library@^1.11.10
    adafruit/Adafruit BusIO@^1.16.1
build_src_filter = +<*>

[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17 -Isrc/domain
; PlatformIO does not link src/ into test binaries by default -- this opts
; in, so the domain/*.cpp files get compiled and linked alongside test/.
test_build_src = yes
; Only compile the hardware-independent domain logic for native tests.
; main.cpp and src/hardware/* depend on Arduino.h / WiFi.h / Adafruit_EPD and
; must NOT be pulled into the native build.
build_src_filter = +<domain/>
